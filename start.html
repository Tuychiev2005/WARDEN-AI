<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warden — Step 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060e;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
 
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(34,197,94,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,197,94,0.03) 1px,transparent 1px);background-size:48px 48px;animation:gridMove 20s linear infinite}
@keyframes gridMove{from{background-position:0 0}to{background-position:48px 48px}}
 
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;max-width:440px;width:100%;backdrop-filter:blur(12px);animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
 
.step-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--green);margin-bottom:20px}
h2{font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-.02em}
.sub{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.5}
 
label{display:block;font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:12px;color:var(--text);
  font-family:'Space Mono',monospace;font-size:14px;
  outline:none;transition:.2s;margin-bottom:16px;
}
input:focus{border-color:var(--green);background:rgba(34,197,94,0.04)}
input::placeholder{color:var(--muted)}
 
.btn{width:100%;padding:16px;background:var(--green);color:#04060e;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:#16a34a;transform:translateY(-1px)}
.btn:disabled{background:#2d3748;color:var(--muted);cursor:not-allowed;transform:none}
 
.error{color:var(--red);font-size:13px;margin-top:12px;display:none;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px}
.info{margin-top:20px;font-size:12px;color:var(--muted);text-align:center}
.info a{color:var(--green);text-decoration:none}
.info a:hover{text-decoration:underline}
 
.steps{display:flex;gap:8px;margin-bottom:32px}
.step{flex:1;height:3px;border-radius:2px;background:var(--border)}
.step.active{background:var(--green)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="steps">
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>
  <div class="step-label">STEP 1 OF 3</div>
  <h2>API Credentials</h2>
  <p class="sub">Enter your Telegram API credentials from <a href="https://my.telegram.org" target="_blank" style="color:var(--green)">my.telegram.org</a></p>
 
  <form action="/connect" method="post" onsubmit="handleSubmit(event)">
    <label>API ID</label>
    <input id="api_id" name="api_id" placeholder="12345678" type="number" required autocomplete="off">
    <label>API HASH</label>
    <input id="api_hash" name="api_hash" placeholder="0123456789abcdef0123456789abcdef" type="text" required autocomplete="off">
    <button type="submit" class="btn" id="submitBtn">Continue →</button>
  </form>
  <div class="error" id="errorMsg"></div>
  <div class="info">Your credentials are stored locally and never shared.</div>
</div>
 
<script>
function handleSubmit(e) {
  const id   = document.getElementById('api_id').value.trim();
  const hash = document.getElementById('api_hash').value.trim();
  const err  = document.getElementById('errorMsg');
  err.style.display = 'none';
 
  if (!id || !hash) {
    e.preventDefault();
    err.textContent = 'Please fill in all fields.';
    err.style.display = 'block';
    return;
  }
  if (isNaN(id) || Number(id) <= 0) {
    e.preventDefault();
    err.textContent = 'API ID must be a positive number.';
    err.style.display = 'block';
    return;
  }
  if (hash.length < 8) {
    e.preventDefault();
    err.textContent = 'API HASH is too short.';
    err.style.display = 'block';
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
}
</script>
</body>
</html>
